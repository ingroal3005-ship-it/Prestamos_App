<h2>Editar Cliente</h2>

<form method="POST">
    {% csrf_token %}

    <label>Nombre:</label>
    <input type="text" name="nombre" value="{{ cliente.nombre }}"><br>

    <label>Grupo:</label>
    <input type="text" name="grupo" value="{{ cliente.grupo }}"><br>

    <label>Capital:</label>
    <input type="number" step="0.01" name="capital" value="{{ cliente.capital }}"><br>

    <button type="submit">Guardar</button>
</form>
